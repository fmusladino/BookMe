<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0F2A47" />
  <title>Sin conexión — BookMe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a1628;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: env(safe-area-inset-top, 24px);
      padding-bottom: env(safe-area-inset-bottom, 24px);
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 20px;
    }
    .wifi-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f1f5f9;
    }
    p {
      font-size: 15px;
      color: #94a3b8;
      line-height: 1.5;
      margin-bottom: 24px;
    }
    .retry-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #14b8a6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.9; }
    .retry-btn:active { transform: scale(0.98); }
    .tip {
      margin-top: 32px;
      padding: 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      font-size: 13px;
      color: #64748b;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="icon" src="/icons/icon-192x192.png" alt="BookMe" />
    <div class="wifi-icon">📡</div>
    <h1>Sin conexión a internet</h1>
    <p>No pudimos conectarnos al servidor. Revisá tu conexión Wi-Fi o datos móviles e intentá de nuevo.</p>
    <button class="retry-btn" onclick="window.location.reload()">
      Reintentar
    </button>
    <div class="tip">
      Tus turnos confirmados se mantienen guardados. Cuando vuelvas a conectarte, todo estará sincronizado.
    </div>
  </div>
</body>
</html>
